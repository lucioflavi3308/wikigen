name: Generate Wiki

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '*.go'
      - 'go.mod'
      - 'go.sum'

jobs:
  wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build wikigen
        run: go build -o wikigen .

      - name: Install Claude CLI
        run: |
          npm install -g @anthropic-ai/claude-code

      - name: Generate wiki
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ./wikigen -lang en -pp 3 tomohiro-owada/wikigen

      - name: Push to wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/tomohiro-owada/wikigen.wiki.git wiki-repo || {
            echo "Wiki not initialized. Enable wiki in repo settings first."
            exit 1
          }
          cp -r wiki-output/wikigen/* wiki-repo/
          cd wiki-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || {
            git commit -m "Update wiki ($(date -u +%Y-%m-%d))"
            git push
          }
